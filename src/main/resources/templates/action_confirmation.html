<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="confirmModal" id="actionConfirmationModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.7); z-index: 110000; align-items: center; justify-content: center; font-family: 'Roboto', sans-serif;">

  <div style="background-color: #ffffff; width: 480px; border-radius: 24px; box-shadow: 0 15px 50px rgba(0,0,0,0.4); padding: 40px; text-align: center; display: flex; flex-direction: column; gap: 25px;">

    <h3 id="confirmModalTitle" style="color: #2b00aa; margin: 0; font-size: 26px; font-weight: bold;">Подтверждение</h3>

    <div style="width: 100px; height: 4px; background-color: #ff4d4d; margin: 0 auto;"></div>

    <p id="confirmModalText" style="color: #333; font-size: 18px; line-height: 1.5; margin: 0;">
      Вы действительно хотите <span style="color: #ff4d4d; font-weight: bold;">отменить</span> свою заявку на участие в этом мероприятии?
    </p>

    <div style="display: flex; gap: 15px; justify-content: center; margin-top: 10px;">
      <button id="confirmYesBtn" style="background-color: #ff4d4d; color: white; border: none; padding: 12px 35px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s;">Да, отменить</button>

      <button id="confirmNoBtn" style="background-color: #aaaaaa; color: white; border: none; padding: 12px 35px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s;">Назад</button>
    </div>
  </div>
</div>
</html>
