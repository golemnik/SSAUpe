<!DOCTYPE html>
<html lang="ru" dir="ltr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация</title>
    <meta name="description" content="На этой странице представлен процесс регистрации системы." />
    <link th:href="@{/css/registration_styles/index.css}" rel="stylesheet" />
    <link rel="icon" type="image/png" th:href="@{/favicon/favicon-96x96.png}" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon/favicon.svg}" />
    <link rel="shortcut icon" th:href="@{/favicon/favicon.ico}" />
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/favicon/apple-touch-icon.png}" />
    <meta name="apple-mobile-web-app-title" content="AboutTheDevelopers" />

    <style>
        .reg-form__error-message {
            color: #e74c3c !important;
            font-size: 16px !important;
            font-weight: 500;
            margin-top: 5px;
            display: block;
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-text-fill-color: #333 !important;
            font-size: 16px !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* Прячем системный инпут, чтобы убрать текст "Файл не выбран" */
        .reg-form__photo-input {
            display: none;
        }

        /* Делаем label кликабельным как кнопку */
        .reg-form__photo-button {
            cursor: pointer;
            display: inline-block;
            text-align: center;
        }
    </style>
</head>

<body>
<section class="reg-layout">
    <div class="reg-layout__container container">

        <div class="reg-card__header">
            <div class="reg-card__logo logo">
                <img src="/images/logo.png" alt="Volunteering" width="200" height="50" />
            </div>
            <a th:href="@{/home/about_devs}" id="sistemButton" class="reg-card__sistem-button button">?</a>
        </div>

        <div class="reg-card__body">
            <h1 class="reg-card__headline headline">Регистрация</h1>
            <p class="reg-card__text">Уже есть аккаунт? <a th:href="@{/login}" class="reg-card__auth-link">Авторизоваться</a></p>
        </div>

        <form class="reg-form" id="registrationForm" th:action="@{/registration}" th:object="${userForm}" method="POST" enctype="multipart/form-data" novalidate>

            <div class="reg-form__photo-block">
                <div class="reg-form__photo-area">
                    <span class="reg-form__photo-title">Фотография профиля</span>
                    <span class="reg-form__photo-hint">200×200 – 1024×1024 (JPEG, PNG, WEBP)</span>
                </div>
                <div class="reg-form__photo-upload">
                    <!-- Заменил класс на reg-form__photo-input -->
                    <input type="file" id="avatar" name="avatarFile" accept="image/jpeg,image/png,image/webp" class="reg-form__photo-input" />
                    <!-- ИСПОЛЬЗУЕМ LABEL вместо SPAN -->
                    <label for="avatar" class="reg-form__photo-button">Загрузить</label>
                </div>
            </div>

            <div class="reg-form__row reg-form__row--first">
                <div class="reg-form__column reg-form__column--auth">

                    <div class="reg-form__group" th:classappend="${#fields.hasErrors('username')} ? 'reg-form__group--error'">
                        <label for="login" class="reg-form__label">Логин:</label>
                        <input type="text" id="login" th:field="*{username}" class="reg-form__input"
                               th:classappend="${#fields.hasErrors('username')} ? 'reg-form__input--error'"
                               minlength="3" maxlength="20" required placeholder="IvanSvistun" />
                        <div class="reg-form__error-message" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        <div class="reg-form__error-message js-error" id="error-login"></div>
                    </div>

                    <div class="reg-form__group">
                        <label for="password" class="reg-form__label">Пароль:</label>
                        <input type="password" id="password" th:field="*{password}" class="reg-form__input"
                               minlength="8" maxlength="25" required placeholder="••••••••••" />
                        <div class="reg-form__error-message js-error" id="error-password"></div>
                    </div>

                    <div class="reg-form__group">
                        <label for="password_confirm" class="reg-form__label">Повтор пароля:</label>
                        <input type="password" id="password_confirm" th:field="*{passwordConfirm}" class="reg-form__input"
                               maxlength="25" required placeholder="Повторите пароль" />
                        <div class="reg-form__error-message js-error" id="error-password_confirm"></div>
                    </div>
                </div>

                <div class="reg-form__column reg-form__column--fio">
                    <div class="reg-form__group">
                        <label for="lastname" class="reg-form__label">Фамилия:</label>
                        <input type="text" id="lastname" th:field="*{lastName}" class="reg-form__input"
                               minlength="2" maxlength="40" placeholder="Иванов" required />
                        <div class="reg-form__error-message js-error" id="error-lastname"></div>
                    </div>
                    <div class="reg-form__group">
                        <label for="firstname" class="reg-form__label">Имя:</label>
                        <input type="text" id="firstname" th:field="*{firstName}" class="reg-form__input"
                               minlength="2" maxlength="40" placeholder="Иван" required />
                        <div class="reg-form__error-message js-error" id="error-firstname"></div>
                    </div>
                    <div class="reg-form__group">
                        <label for="patronymic" class="reg-form__label">Отчество:</label>
                        <input type="text" id="patronymic" th:field="*{middleName}" class="reg-form__input"
                               minlength="2" maxlength="40" placeholder="Иванович" />
                        <div class="reg-form__error-message js-error" id="error-patronymic"></div>
                    </div>
                </div>
            </div>

            <div class="reg-form__row reg-form__row--full">
                <div class="reg-form__group reg-form__group--full">
                    <label for="volunteer_id" class="reg-form__label">Номер волонтёрской книжки:</label>
                    <input type="text" id="volunteer_id" th:field="*{volunteerBookId}" class="reg-form__input"
                           maxlength="13" placeholder="ВК-1234567890" required />
                    <div class="reg-form__error-message js-error" id="error-volunteer_id"></div>
                </div>
            </div>

            <div class="reg-form__row reg-form__row--third">
                <div class="reg-form__column reg-form__column--personal">
                    <div class="reg-form__group">
                        <label for="birthdate" class="reg-form__label">Дата рождения:</label>
                        <input type="date" id="birthdate" th:field="*{birthDate}" class="reg-form__input reg-form__birthdate" required />
                        <div class="reg-form__error-message js-error" id="error-birthdate"></div>
                    </div>
                    <div class="reg-form__group">
                        <label class="reg-form__label">Опыт участия:</label>
                        <div class="reg-form__checkboxes">
                            <label class="reg-form__checkbox">
                                <input type="checkbox" name="experiences" value="SPORTS" checked />
                                <span>Спортивные мероприятия</span>
                            </label>
                            <label class="reg-form__checkbox">
                                <input type="checkbox" name="experiences" value="CULTURAL" />
                                <span>Культурные мероприятия</span>
                            </label>
                            <label class="reg-form__checkbox">
                                <input type="checkbox" name="experiences" value="EDUCATIONAL" />
                                <span>Образовательные мероприятия</span>
                            </label>
                            <label class="reg-form__checkbox">
                                <input type="checkbox" name="experiences" value="SOCIAL" />
                                <span>Социальные мероприятия</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="reg-form__column reg-form__column--contacts">
                    <div class="reg-form__group">
                        <label for="email" class="reg-form__label">Электронная почта:</label>
                        <input type="email" id="email" th:field="*{email}" class="reg-form__input"
                               minlength="6" maxlength="54" required placeholder="ivan@example.com" />
                        <div class="reg-form__error-message js-error" id="error-email"></div>
                    </div>

                    <div class="reg-form__group">
                        <label for="phone" class="reg-form__label">Номер телефона:</label>
                        <input type="tel" id="phone" th:field="*{phoneNumber}" class="reg-form__input"
                               maxlength="12" placeholder="+79991234567" required />
                        <div class="reg-form__error-message js-error" id="error-phone"></div>
                    </div>

                    <div class="reg-form__group">
                        <label for="additional_lang" class="reg-form__label">Дополнительный язык:</label>
                        <select id="additional_lang" th:field="*{additionalLanguage}" class="reg-form__select">
                            <option value="">Не выбран</option>
                            <option value="english">Английский</option>
                            <option value="german">Немецкий</option>
                            <option value="french">Французский</option>
                            <option value="spanish">Испанский</option>
                            <option value="chinese">Китайский</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="reg-form__row reg-form__row--submit">
                <button type="submit" class="reg-form__submit-button">
                    Зарегистрироваться
                </button>
            </div>

        </form>
    </div>
</section>

<script th:src="@{/js/registration.js}"></script>
</body>
</html>
